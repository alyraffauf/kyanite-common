# systemd-sysupdate writes here as systemd-pull (systemd_importd_t) and
# renames into place as the parent (init_t). The dirs need the
# systemd_importd_var_run_t label registered in 04-workarounds.sh; the
# matching policy module grants init_t the rename/unlink ops it needs.
# Z forces the right label even on dirs that pre-date the policy.
d /var/lib/sysupdate 0755 root root -
Z /var/lib/sysupdate - - - -
d /var/lib/extensions 0755 root root -
Z /var/lib/extensions - - - -
